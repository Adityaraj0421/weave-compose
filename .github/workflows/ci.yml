name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy --strict .

      - name: Run pytest
        run: |
          set +e
          pytest --tb=short -q
          STATUS=$?
          set -e
          [ "$STATUS" -eq 0 ] || [ "$STATUS" -eq 5 ]
